# Railway / Nixpacks build configuration for the fulfillment app.
# Builds the React frontend into frontend/dist, installs Python deps for the
# FastAPI backend, and serves both from a single process. The backend mounts
# frontend/dist as static files (see backend/main.py).

[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r backend/requirements.txt",
  "cd frontend && npm ci",
]

[phases.build]
cmds = [
  "cd frontend && npm run build",
]

[start]
cmd = ". /opt/venv/bin/activate && cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
